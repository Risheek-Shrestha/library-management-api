services:
  db:
    container_name: postgres-spring-boot
    image: postgres:latest
    environment:
      POSTGRES_USER: risheek
      POSTGRES_PASSWORD: risheek@05
      PGDATA: /data/postgres
    volumes:
      - /home/risheek/Desktop/class/springboot/postgres-data:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db: